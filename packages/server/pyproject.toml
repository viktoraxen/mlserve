[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[project]
name = "mlserver"
version = "0.1.0"
description = "ONNX model serving API"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]>=0.133.1",
    "numpy>=2.4.2",
    "onnx>=1.20.1",
    "onnxruntime>=1.24.2",
    "onnxscript>=0.6.2",
    "pillow>=11.0",
    "sqlmodel>=0.0.37",
]

[project.scripts]
server = "mlserver.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
