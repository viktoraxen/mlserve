[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"

[project]
name = "mlclient"
version = "0.1.0"
description = "Lightweight client for the mlserver API"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.28",
    "inquirerpy>=0.3.4",
    "onnxscript>=0.6.2",
]

[tool.setuptools.packages.find]
where = ["src"]
